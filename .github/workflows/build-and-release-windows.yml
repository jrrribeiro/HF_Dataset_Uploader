name: Build Windows EXE and Release

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

jobs:
  build-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        working-directory: hf_upload_app
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE with PyInstaller
        working-directory: hf_upload_app
        run: |
          pyinstaller hf_upload_app.spec --noconfirm

      - name: Package EXE into zip
        working-directory: hf_upload_app
        shell: powershell
        run: |
          $items = Get-ChildItem -Path .\dist -Directory | Select-Object -First 1
          if ($items) { Compress-Archive -Path (Join-Path .\dist $items.Name) -DestinationPath ..\hf_upload_app-${{ github.ref_name }}-windows.zip -Force }

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: hf_upload_app-${{ github.ref_name }}-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
