name: Sync app to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-space:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: jrrribeiro
          HF_SPACE_NAME: BirdNET-Uploader-App
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN secret is required"
            exit 1
          fi
          git push "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}" HEAD:main --force
